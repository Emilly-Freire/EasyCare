<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Erro no Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/disciplinas">ConcluiAí</a>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="alert alert-danger text-center">
            <i class="bi bi-exclamation-triangle-fill fs-1"></i>
            <h1 class="mt-3">Erro!</h1>
            <#if erro??>
                <p class="lead">${erro}</p>
            <#else>
                <p class="lead">Ocorreu um erro inesperado no sistema.</p>
            </#if>
            <hr>
            <p class="mb-0">Tente <a href="/disciplinas" class="alert-link">voltar para a lista de disciplinas</a> ou tente novamente mais tarde.</p>
        </div>
    </div>
</body>
</html>
